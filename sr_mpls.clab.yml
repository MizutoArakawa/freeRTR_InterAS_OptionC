name: freeRTR_InterAS-OptionC

mgmt:
  network: free_IASC_mgmt
  ipv4-subnet: 172.31.0.0/24

topology:
  nodes:
    PE_A:
      kind: rare
      image: ghcr.io/rare-freertr/freertr-containerlab:main
      mgmt-ipv4: 172.31.0.2
      binds:
        - startup_configuration/PE_A/rtr-sw.txt:/rtr/rtr-sw.txt
    PE_B:
      kind: rare
      image: ghcr.io/rare-freertr/freertr-containerlab:main
      mgmt-ipv4: 172.31.0.3 
      binds:
        - startup_configuration/PE_B/rtr-sw.txt:/rtr/rtr-sw.txt
    P1:
      kind: rare
      image: ghcr.io/rare-freertr/freertr-containerlab:main
      mgmt-ipv4: 172.31.0.4 
      binds:
        - startup_configuration/P1/rtr-sw.txt:/rtr/rtr-sw.txt
    P2:
      kind: rare
      image: ghcr.io/rare-freertr/freertr-containerlab:main
      mgmt-ipv4: 172.31.0.5
      binds:
        - startup_configuration/P2/rtr-sw.txt:/rtr/rtr-sw.txt
    ASBR1:
      kind: rare
      image: ghcr.io/rare-freertr/freertr-containerlab:main
      mgmt-ipv4: 172.31.0.6
      binds:
        - startup_configuration/ASBR1/rtr-sw.txt:/rtr/rtr-sw.txt
    ASBR2:
      kind: rare
      image: ghcr.io/rare-freertr/freertr-containerlab:main
      mgmt-ipv4: 172.31.0.7
      binds:
        - startup_configuration/ASBR2/rtr-sw.txt:/rtr/rtr-sw.txt
    eASBR1:
      kind: rare
      image: ghcr.io/rare-freertr/freertr-containerlab:main
      mgmt-ipv4: 172.31.0.8
      binds:
        - startup_configuration/eASBR1/rtr-sw.txt:/rtr/rtr-sw.txt
    eASBR2:
      kind: rare
      image: ghcr.io/rare-freertr/freertr-containerlab:main
      mgmt-ipv4: 172.31.0.9
      binds:
        - startup_configuration/eASBR2/rtr-sw.txt:/rtr/rtr-sw.txt
    ePE_A:
      kind: rare
      image: ghcr.io/rare-freertr/freertr-containerlab:main
      mgmt-ipv4: 172.31.0.10
      binds:
        - startup_configuration/ePE_A/rtr-sw.txt:/rtr/rtr-sw.txt
    ePE_B:
      kind: rare
      image: ghcr.io/rare-freertr/freertr-containerlab:main
      mgmt-ipv4: 172.31.0.11
      binds:
        - startup_configuration/ePE_B/rtr-sw.txt:/rtr/rtr-sw.txt
    
    #client
    VPC1_1:
      kind: linux
      image: floui/tiny-net-tools:latest
      binds:
        - startup_configuration/VPC1_1/ifsetup.sh:/root/ifsetup.sh
      exec:
        - /bin/ash -c "chmod +x /root/ifsetup.sh && /root/ifsetup.sh"
    VPC1_2:
      kind: linux
      image: floui/tiny-net-tools:latest
      binds:
        - startup_configuration/VPC1_2/ifsetup.sh:/root/ifsetup.sh
      exec:
        - /bin/ash -c "chmod +x /root/ifsetup.sh && /root/ifsetup.sh"
    VPC2_1:
      kind: linux
      image: floui/tiny-net-tools:latest
      binds:
        - startup_configuration/VPC2_1/ifsetup.sh:/root/ifsetup.sh
      exec:
        - /bin/ash -c "chmod +x /root/ifsetup.sh && /root/ifsetup.sh"
    VPC2_2:
      kind: linux
      image: floui/tiny-net-tools:latest
      binds:
        - startup_configuration/VPC2_2/ifsetup.sh:/root/ifsetup.sh
      exec:
        - /bin/ash -c "chmod +x /root/ifsetup.sh && /root/ifsetup.sh"

  links:
    - endpoints: ["PE_A:eth2","P1:eth1"]
    - endpoints: ["PE_A:eth3","P2:eth1"]
    - endpoints: ["PE_B:eth2","P1:eth2"]
    - endpoints: ["PE_B:eth3","P2:eth2"]
    - endpoints: ["P1:eth3","ASBR1:eth1"]
    - endpoints: ["P1:eth4","ASBR2:eth1"]
    - endpoints: ["P2:eth3","ASBR1:eth2"]
    - endpoints: ["P2:eth4","ASBR2:eth2"]
    - endpoints: ["ASBR1:eth3","ASBR2:eth3"]
    - endpoints: ["ASBR1:eth4","ASBR2:eth4"]
    - endpoints: ["ASBR1:eth5","eASBR1:eth5"]
    - endpoints: ["ASBR2:eth5","eASBR2:eth5"]
    - endpoints: ["eASBR1:eth3","eASBR2:eth3"]
    - endpoints: ["eASBR1:eth4","eASBR2:eth4"]
    - endpoints: ["eASBR1:eth1","ePE_A:eth2"]
    - endpoints: ["eASBR1:eth2","ePE_B:eth2"]
    - endpoints: ["eASBR2:eth1","ePE_A:eth3"]
    - endpoints: ["eASBR2:eth2","ePE_B:eth3"]
    - endpoints: ["VPC1_1:eth1","PE_A:eth1"]
    - endpoints: ["VPC2_1:eth1","PE_B:eth1"]
    - endpoints: ["VPC1_2:eth1","ePE_A:eth1"]
    - endpoints: ["VPC2_2:eth1","ePE_B:eth1"]
